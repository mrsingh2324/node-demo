name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-docker@v4
        with:
          version: 'latest'
          compose: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker images
        run: |
          docker compose build

      - name: Start services
        run: |
          docker compose up -d

      - name: Wait for services to be ready
        run: |
          sleep 15

      - name: Run integration tests
        run: |
          chmod +x ./integration-test.sh
          ./integration-test.sh

      - name: Stop services
        if: always()
        run: |
          docker compose down

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKER_HUB_USERNAME }}
          password: ${{ env.DOCKER_HUB_TOKEN }}

      - name: Build and push Auth Service
        uses: docker/build-push-action@v4
        with:
          context: ./auth-service
          push: true
          tags: ${{ env.DOCKER_HUB_USERNAME }}/auth-service:latest,${{ env.DOCKER_HUB_USERNAME }}/auth-service:${{ github.sha }}

      - name: Build and push Book Service
        uses: docker/build-push-action@v4
        with:
          context: ./book-service
          push: true
          tags: ${{ env.DOCKER_HUB_USERNAME }}/book-service:latest,${{ env.DOCKER_HUB_USERNAME }}/book-service:${{ github.sha }}

      - name: Build and push API Gateway
        uses: docker/build-push-action@v4
        with:
          context: ./api-gateway
          push: true
          tags: ${{ env.DOCKER_HUB_USERNAME }}/api-gateway:latest,${{ env.DOCKER_HUB_USERNAME }}/api-gateway:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Google Cloud Auth
        uses: google-github-actions/auth@v1
        with:
          credentials_json: '${{ env.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Deploy Auth Service to Cloud Run
        run: |
          gcloud run deploy auth-service \
            --image ${{ env.DOCKER_HUB_USERNAME }}/auth-service:latest \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --memory 512Mi \
            --set-env-vars "NODE_ENV=production,JWT_SECRET=${{ secrets.JWT_SECRET }}"

      - name: Deploy Book Service to Cloud Run
        run: |
          gcloud run deploy book-service \
            --image ${{ env.DOCKER_HUB_USERNAME }}/book-service:latest \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --memory 512Mi

      - name: Get Cloud Run URLs
        run: |
          AUTH_URL=$(gcloud run services describe auth-service --region us-central1 --format 'value(status.url)')
          BOOK_URL=$(gcloud run services describe book-service --region us-central1 --format 'value(status.url)')
          echo "AUTH_URL=$AUTH_URL" >> $GITHUB_ENV
          echo "BOOK_URL=$BOOK_URL" >> $GITHUB_ENV

      - name: Deploy API Gateway to Cloud Run
        run: |
          gcloud run deploy api-gateway \
            --image ${{ env.DOCKER_HUB_USERNAME }}/api-gateway:latest \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --memory 512Mi \
            --set-env-vars "AUTH_SERVICE_URL=${{ env.AUTH_URL }},BOOK_SERVICE_URL=${{ env.BOOK_URL }}"

      - name: Show deployed URLs
        run: |
          echo "✅ Deployment complete!"
          echo "API Gateway: $(gcloud run services describe api-gateway --region us-central1 --format 'value(status.url)')"
